<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kings Oluwafemi - Salary Trap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Montserrat', 'Arial Black', 'Impact', sans-serif;
  }
  .post-image {
    width: 1080px;
    height: 1080px;
    background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=1080&q=80') center/cover no-repeat;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    overflow: hidden;
  }
  /* Dark overlay - strong for contrast */
  .post-image::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.70);
    z-index: 0;
  }
  /* Bottom gradient for depth */
  .post-image::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    width: 100%;
  }
  /* Top small text - aggressive */
  .top-text {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ffffff;
    opacity: 0.85;
    line-height: 1.3;
    font-family: 'Montserrat', sans-serif;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .top-text .highlight {
    color: #d4a843;
  }
  /* Main headline - MASSIVE */
  .main-line {
    font-size: 110px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: -3px;
    color: #ffffff;
    text-shadow: 0 4px 40px rgba(0,0,0,0.6);
    margin: 20px 0;
    font-family: 'Arial Black', 'Impact', sans-serif;
  }
  .main-line.red {
    font-size: 120px;
    color: #ff3b30;
    text-shadow: 0 0 60px rgba(255, 59, 48, 0.25), 0 4px 40px rgba(0,0,0,0.6);
  }
  /* Bottom text */
  .bottom-text {
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    margin-top: 10px;
    letter-spacing: 2px;
    text-shadow: 0 2px 30px rgba(0,0,0,0.8);
    font-family: 'Montserrat', sans-serif;
  }
  .bottom-text .gold {
    color: #d4a843;
  }
  /* Brand watermark - bottom right */
  .brand {
    position: absolute;
    bottom: 35px;
    right: 45px;
    z-index: 2;
    color: rgba(255,255,255,0.08);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: 'Montserrat', sans-serif;
  }
  @media (max-width: 1100px) {
    .post-image {
      width: 100vw;
      height: 100vw;
      padding: 5vw;
    }
    .top-text { font-size: 3vw; letter-spacing: 0.3vw; }
    .main-line { font-size: 10vw; letter-spacing: -0.3vw; }
    .main-line.red { font-size: 11vw; }
    .bottom-text { font-size: 4.5vw; }
    .brand { font-size: 1.4vw; bottom: 3vw; right: 4vw; }
  }
</style>
</head>
<body>
<div class="post-image">
  <div class="content">
    <div class="top-text">
      YOUR BOSS DOESN'T WANT<br>
      YOU TO KNOW THIS BUT...
    </div>
    <div class="main-line">YOUR SALARY</div>
    <div class="main-line red">IS A DRUG</div>
    <div class="bottom-text">
      And your boss is <span class="gold">YOUR DEALER</span>.
    </div>
  </div>
  <div class="brand">Kings Oluwafemi</div>
</div>
</body>
</html>
