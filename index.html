<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kings Oluwafemi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#0a0a0a;
}

.post{

width:1080px;
height:1350px;

background:
linear-gradient(rgba(8,15,12,.78),rgba(8,15,12,.88)),
url("https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?q=80&w=1400&auto=format&fit=crop");

background-size:cover;
background-position:center;

position:relative;
overflow:hidden;

padding:95px;

display:flex;
flex-direction:column;
justify-content:center;

}

.post::before{

content:'';

position:absolute;

top:-180px;
right:-180px;

width:500px;
height:500px;

border-radius:50%;

background:rgba(34,197,94,.08);

}

.post::after{

content:'';

position:absolute;

bottom:-120px;
left:-120px;

width:350px;
height:350px;

border-radius:50%;

background:rgba(34,197,94,.05);

}

.small{

position:relative;

font-size:28px;

font-weight:800;

letter-spacing:8px;

color:#22c55e;

text-transform:uppercase;

margin-bottom:40px;

}

.main{

position:relative;

font-size:120px;

font-weight:900;

line-height:.95;

text-transform:uppercase;

color:white;

}

.green{

color:#22c55e;

}

.desc{

position:relative;

margin-top:70px;

font-size:42px;

line-height:1.5;

color:#d1d5db;

max-width:720px;

font-weight:500;

}

.brand{

position:absolute;

bottom:70px;

left:90px;

font-size:38px;

font-weight:900;

letter-spacing:3px;

color:#22c55e;

text-transform:uppercase;

}

.tag{

display:block;

font-size:22px;

font-weight:700;

letter-spacing:4px;

margin-top:8px;

color:white;

opacity:.9;

}

.bar{

position:absolute;

left:90px;

top:140px;

width:120px;

height:8px;

background:#22c55e;

}

</style>

</head>

<body>

<div class="post">

<div class="bar"></div>

<div class="small">
PERSONAL FINANCE
</div>

<div class="main">
IF YOU CAN'T<br>

MANAGE<br>

<span class="green">₦100,000,</span>
</div>

<div class="main" style="margin-top:35px;">

YOU WON'T<br>

MANAGE<br>

<span class="green">₦10 MILLION.</span>

</div>

<div class="desc">

Income creates opportunities.

<br><br>

Habits determine whether you keep them.

</div>

<div class="brand">

👑 KINGS OLUWAFEMI

<span class="tag">

MONEY • WEALTH • GROWTH

</span>

</div>

</div>

</body>
  </html>
