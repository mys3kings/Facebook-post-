<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kings Oluwafemi - Break Free</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .post-image {
    width: 1080px;
    height: 1080px;
    background: url('https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1080&q=80') center/cover no-repeat;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    overflow: hidden;
  }
  /* Dark overlay - stronger for bold text */
  .post-image::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: 0;
  }
  /* Premium glow */
  .post-image::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 700px;
    height: 700px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(212, 168, 67, 0.08) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    width: 100%;
  }
  .tag {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #d4a843;
    margin-bottom: 30px;
    font-family: 'Inter', sans-serif;
    opacity: 0.9;
  }
  /* BOLD main text - much larger and heavier */
  .main-quote {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.1;
    color: #ffffff;
    letter-spacing: -2px;
    max-width: 900px;
    margin: 0 auto;
    text-shadow: 0 4px 50px rgba(0,0,0,0.7);
  }
  .main-quote .gold {
    color: #d4a843;
    position: relative;
    font-weight: 900;
  }
  .main-quote .gold::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent, #d4a843, transparent);
    border-radius: 2px;
  }
  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #d4a843, transparent);
    margin: 40px auto;
  }
  .sub-text {
    font-size: 26px;
    font-weight: 400;
    color: #cccccc;
    letter-spacing: 2px;
    font-family: 'Inter', sans-serif;
    text-shadow: 0 2px 30px rgba(0,0,0,0.8);
  }
  .sub-text .name {
    color: #d4a843;
    font-weight: 700;
  }
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: rgba(212, 168, 67, 0.25);
    border-style: solid;
    border-width: 0;
    z-index: 1;
  }
  .corner-tl { top: 40px; left: 40px; border-top-width: 3px; border-left-width: 3px; }
  .corner-tr { top: 40px; right: 40px; border-top-width: 3px; border-right-width: 3px; }
  .corner-bl { bottom: 40px; left: 40px; border-bottom-width: 3px; border-left-width: 3px; }
  .corner-br { bottom: 40px; right: 40px; border-bottom-width: 3px; border-right-width: 3px; }
  .brand {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    color: rgba(255,255,255,0.06);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 8px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  @media (max-width: 1100px) {
    .post-image {
      width: 100vw;
      height: 100vw;
      padding: 6vw;
    }
    .main-quote { font-size: 7vw; }
    .tag { font-size: 1.4vw; letter-spacing: 0.5vw; }
    .sub-text { font-size: 2.2vw; }
    .brand { font-size: 1.2vw; bottom: 3vw; letter-spacing: 0.6vw; }
    .corner { width: 5vw; height: 5vw; }
    .corner-tl { top: 3vw; left: 3vw; }
    .corner-tr { top: 3vw; right: 3vw; }
    .corner-bl { bottom: 3vw; left: 3vw; }
    .corner-br { bottom: 3vw; right: 3vw; }
    .divider { width: 7vw; height: 0.3vw; margin: 3.5vw auto; }
    .post-image::before { width: 60vw; height: 60vw; }
  }
</style>
</head>
<body>
<div class="post-image">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="content">
    <div class="tag">⛓️ BREAK FREE</div>
    <div class="main-quote">
      The system wasn't built<br>
      <span class="gold">FOR YOU</span> to win.<br>
      It was built <span class="gold">FOR YOU</span> to stay.
    </div>
    <div class="divider"></div>
    <div class="sub-text">
      — <span class="name">Kings Oluwafemi</span>
    </div>
  </div>
  <div class="brand">Kings Oluwafemi</div>
</div>
</body>
</html>
