<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kings Oluwafemi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#050505;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.post{

width:1080px;

height:1350px;

position:relative;

overflow:hidden;

padding:90px;

display:flex;

flex-direction:column;

justify-content:center;

background:

linear-gradient(rgba(8,12,10,.82),rgba(8,12,10,.88)),

url("https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?q=80&w=1600&auto=format&fit=crop");

background-size:cover;

background-position:center;

}

.post::before{

content:'';

position:absolute;

top:-180px;

right:-180px;

width:420px;

height:420px;

border-radius:50%;

background:rgba(34,197,94,.08);

}

.post::after{

content:'';

position:absolute;

bottom:-120px;

left:-120px;

width:280px;

height:280px;

border-radius:50%;

background:rgba(34,197,94,.05);

}

.bar{

width:120px;

height:8px;

background:#22c55e;

margin-bottom:35px;

}

.small{

font-size:28px;

font-weight:800;

letter-spacing:8px;

text-transform:uppercase;

color:#22c55e;

margin-bottom:40px;

position:relative;

z-index:2;

}

.main{

font-size:118px;

font-weight:900;

line-height:.93;

text-transform:uppercase;

color:white;

position:relative;

z-index:2;

}

.green{

color:#22c55e;

}
  .desc{

position:relative;

z-index:2;

margin-top:60px;

margin-bottom:150px;

max-width:670px;

font-size:40px;

line-height:1.6;

font-weight:500;

color:#f3f4f6;

}

.brand{

position:absolute;

left:90px;

bottom:65px;

z-index:5;

background:rgba(0,0,0,.45);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(10px);

padding:20px 30px;

border-radius:18px;

}

.brand-name{

font-size:36px;

font-weight:900;

letter-spacing:2px;

color:#22c55e;

text-transform:uppercase;

}

.brand-tag{

margin-top:8px;

font-size:18px;

font-weight:700;

letter-spacing:3px;

color:white;

opacity:.85;

text-transform:uppercase;

}

</style>

</head>

<body>

<div class="post">

<div class="bar"></div>

<div class="small">

PERSONAL FINANCE

</div>
<div class="main">

IF YOU CAN'T<br>

MANAGE<br>

<span class="green">₦100,000,</span>

</div>

<div class="main" style="margin-top:35px;">

YOU WON'T<br>

MANAGE<br>

<span class="green">₦10 MILLION.</span>

</div>

<div class="desc">

Income creates opportunities.

<br><br>

Habits determine whether you keep them.

</div>
<div class="brand">

<div class="brand-name">

👑 KINGS OLUWAFEMI

</div>

<div class="brand-tag">

MONEY • WEALTH • GROWTH

</div>

</div>
</div>

</body>

</html>
