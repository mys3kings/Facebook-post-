<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Rules</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#f7f7f5;
color:#111;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:50px;
}

.container{
max-width:1200px;
display:grid;
grid-template-columns:1fr 1fr;
gap:80px;
align-items:center;
}

.small{
font-size:14px;
letter-spacing:2px;
text-transform:uppercase;
color:#666;
margin-bottom:20px;
}

h1{
font-size:72px;
line-height:1.05;
margin-bottom:25px;
font-weight:800;
}

p{
font-size:20px;
line-height:1.8;
color:#555;
margin-bottom:40px;
}

button{
background:#111;
color:white;
border:none;
padding:18px 34px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.card{
background:white;
padding:50px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.stat{
font-size:60px;
font-weight:800;
margin-bottom:10px;
}

.label{
color:#666;
font-size:18px;
margin-bottom:35px;
}

.line{
height:8px;
background:#ececec;
border-radius:50px;
margin:18px 0;
overflow:hidden;
}

.fill{
height:100%;
width:82%;
background:#111;
border-radius:50px;
}

.footer{
margin-top:35px;
font-size:15px;
color:#777;
}

@media(max-width:900px){
.container{
grid-template-columns:1fr;
}

h1{
font-size:52px;
}
}
</style>

</head>

<body>

<div class="container">

<div>

<div class="small">
Personal Finance
</div>

<h1>
Money grows where discipline lives.
</h1>

<p>
The biggest financial advantage isn't earning more.
It's learning how to make every decision count.
Small habits become wealth over time.
</p>

<button>
Learn More
</button>

</div>

<div class="card">

<div class="stat">
82%
</div>

<div class="label">
People wish they learned about money earlier.
</div>

<div class="line">
<div class="fill"></div>
</div>

<div class="footer">
Build habits before chasing income.
</div>

</div>

</div>

</body>
</html>
